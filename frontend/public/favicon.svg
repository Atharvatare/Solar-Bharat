<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  <!-- Sun circle -->
  <circle cx="32" cy="28" r="14" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="8" x2="32" y2="3"/>
    <line x1="32" y1="48" x2="32" y2="53"/>
    <line x1="12" y1="28" x2="7" y2="28"/>
    <line x1="52" y1="28" x2="57" y2="28"/>
    <line x1="17.9" y1="13.9" x2="14.3" y2="10.3"/>
    <line x1="46.1" y1="13.9" x2="49.7" y2="10.3"/>
    <line x1="17.9" y1="42.1" x2="14.3" y2="45.7"/>
    <line x1="46.1" y1="42.1" x2="49.7" y2="45.7"/>
  </g>
  <!-- Solar panel base -->
  <rect x="16" y="44" width="32" height="16" rx="2" fill="#1e293b" stroke="#F59E0B" stroke-width="1"/>
  <!-- Panel grid lines -->
  <line x1="32" y1="44" x2="32" y2="60" stroke="#334155" stroke-width="0.8"/>
  <line x1="24" y1="44" x2="24" y2="60" stroke="#334155" stroke-width="0.8"/>
  <line x1="40" y1="44" x2="40" y2="60" stroke="#334155" stroke-width="0.8"/>
  <line x1="16" y1="52" x2="48" y2="52" stroke="#334155" stroke-width="0.8"/>
</svg>
